name: Build (Windows)

on:
  workflow_call:
    inputs:
      python-version:
        type: string
        default: '3.13'

env:
  BUILD_TYPE: Release

jobs:
  build:
    name: Build Release (Windows)
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-2022, windows-11-arm]

    env:
      CONAN_HOME: ${{ github.workspace }}/.conan-home

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      - name: Create virtual environment
        run: python3 -m venv .pyenv

      - name: Activate virtual environment
        run: .pyenv\Scripts\activate.bat

      - name: Setup environment
        run: |
          pip3 install wheel
          pip3 install -r requirements.txt
          conan profile detect

      - name: Conan Install
        run: |
          python3 build.py conan-install --with-tests

      - name: Cache libclang
        uses: actions/cache@v5
        env:
          cache-name: cache-libclang
        with:
          path: .libclang-cache/download/*.7z
          key: ${{ runner.os }}-${{ runner.arch }}-build-${{ env.cache-name }}-${{ hashFiles('libclang/libclang-urls.txt') }}

      - name: Configure
        run: |
          python3 build.py configure --with-tests

      - name: Build
        run: |
          python3 build.py build

      - name: Test
        run: |
          cd .build
          ctest --verbose --output-on-failure
      
      - name: Create Conan package & Run CLI smoke tests
        shell: bash
        run: |
          python3 build.py conan-create
