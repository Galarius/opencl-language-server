name: Release

on:
  push:
    tags:
      - '[0-9]+.*'

jobs:
  windows:
    name: Windows
    uses: ./.github/workflows/release-windows.yml
    with:
      python-version: '3.13'

  linux:
    name: Linux
    uses: ./.github/workflows/release-linux.yml
    with:
      python-version: '3.13'

  macos:
    name: macOS
    uses: ./.github/workflows/release-macos.yml
    with:
      python-version: '3.13'
    secrets:
      BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
      P12_PASSWORD:             ${{ secrets.P12_PASSWORD }}
      KEYCHAIN_PASSWORD:        ${{ secrets.KEYCHAIN_PASSWORD }}
      APPLE_ID:                 ${{ secrets.APPLE_ID }}
      TEAM_ID:                  ${{ secrets.TEAM_ID }}
      NOTARYTOOL_PASSWORD:      ${{ secrets.NOTARYTOOL_PASSWORD }}
      SIGNING_IDENTITY:         ${{ secrets.SIGNING_IDENTITY }}

  create_release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [windows, linux, macos]
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          skip-decompress: true
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          name: Release ${{ github.ref_name }}
          draft: true
          prerelease: false
          files: |
            licenses.tar.gz
            opencl-language-server-linux-x86_64.tar.gz
            opencl-language-server-linux-arm64.tar.gz
            opencl-language-server-darwin-x86_64.tar.gz
            opencl-language-server-darwin-arm64.tar.gz
            opencl-language-server-darwin-universal.tar.gz
            opencl-language-server-win32-x86_64.zip
            opencl-language-server-win32-arm64.zip