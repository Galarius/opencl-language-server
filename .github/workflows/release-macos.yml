name: Release (macOS)

on:
  workflow_call:
    inputs:
      python-version:
        type: string
        default: '3.13'
    secrets:
      BUILD_CERTIFICATE_BASE64:
        required: true
      P12_PASSWORD:
        required: true
      KEYCHAIN_PASSWORD:
        required: true
      APPLE_ID:
        required: true
      TEAM_ID:
        required: true
      NOTARYTOOL_PASSWORD:
        required: true
      SIGNING_IDENTITY:
        required: true
      # KEYCHAIN_PROFILE is a repository variable (vars.*), not a secret,
      # so it is accessed directly from the caller's context and does not
      # need to be forwarded through workflow_call secrets.

env:
  BUILD_TYPE: Release

jobs:
  build:
    name: Build Release (macOS)
    runs-on: macos-latest

    env:
      CONAN_HOME: ${{ github.workspace }}/.conan-home

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      - name: Create virtual environment
        run: python3 -m venv .pyenv

      - name: Activate virtual environment
        run: source .pyenv/bin/activate

      - name: Setup environment
        run: |
          pip3 install wheel
          pip3 install -r requirements.txt
          conan profile detect

      - name: Cache libclang
        uses: actions/cache@v5
        env:
          cache-name: cache-libclang
        with:
          path: .libclang-cache/download/*.7z
          key: ${{ runner.os }}-universal-build-${{ env.cache-name }}-${{ hashFiles('libclang/libclang-urls.txt') }}

      - name: Configure & Build
        run: |
          ./build.py conan-install -o .conan-x86_64 -pr:h profiles/darwin.release.x86_64
          ./build.py configure -t .conan-x86_64/build/Release/generators/conan_toolchain.cmake -b .build-x86_64 -bt Release
          ./build.py build -b .build-x86_64
          file .build-x86_64/opencl-language-server

          ./build.py conan-install -o .conan-armv8 -pr:h profiles/darwin.release.armv8
          ./build.py configure -t .conan-armv8/build/Release/generators/conan_toolchain.cmake -b .build-armv8 -bt Release
          ./build.py build -b .build-armv8
          file .build-armv8/opencl-language-server

          mkdir -p .build-universal/
          lipo -create -output .build-universal/opencl-language-server \
            .build-x86_64/opencl-language-server \
            .build-armv8/opencl-language-server
          lipo -archs .build-universal/opencl-language-server
          file .build-universal/opencl-language-server

      - name: Upload unsigned binaries
        uses: actions/upload-artifact@v7
        with:
          name: opencl-language-server-macos-unsigned
          path: |
            .build-x86_64/opencl-language-server
            .build-armv8/opencl-language-server
            .build-universal/opencl-language-server
          retention-days: 1

  sign:
    name: Sign & Notarize (macOS)
    runs-on: macos-latest
    needs: build

    steps:
      - uses: actions/checkout@v5

      - name: Download unsigned binaries
        uses: actions/download-artifact@v4
        with:
          name: opencl-language-server-macos-unsigned
          merge-multiple: true

      - name: Restore binary permissions
        run: |
          chmod +x .build-x86_64/opencl-language-server
          chmod +x .build-armv8/opencl-language-server
          chmod +x .build-universal/opencl-language-server

      - name: Setup Apple signing
        id: setup-signing
        uses: ./.github/actions/setup-apple-signing
        with:
          build-certificate-base64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          p12-password:             ${{ secrets.P12_PASSWORD }}
          keychain-password:        ${{ secrets.KEYCHAIN_PASSWORD }}
          apple-id:                 ${{ secrets.APPLE_ID }}
          team-id:                  ${{ secrets.TEAM_ID }}
          notarytool-password:      ${{ secrets.NOTARYTOOL_PASSWORD }}
          keychain-profile:         ${{ vars.KEYCHAIN_PROFILE }}

      - name: Sign and notarize (x86_64)
        id: sign-x86_64
        uses: ./.github/actions/sign-and-notarize
        with:
          binary-path:       .build-x86_64/opencl-language-server
          entitlements-path: build-support/opencl-language-server.entitlements
          signing-identity:  ${{ secrets.SIGNING_IDENTITY }}
          keychain-profile:  ${{ vars.KEYCHAIN_PROFILE }}
          archive-name:      opencl-language-server-darwin-x86_64

      - name: Sign and notarize (arm64)
        id: sign-arm64
        uses: ./.github/actions/sign-and-notarize
        with:
          binary-path:       .build-armv8/opencl-language-server
          entitlements-path: build-support/opencl-language-server.entitlements
          signing-identity:  ${{ secrets.SIGNING_IDENTITY }}
          keychain-profile:  ${{ vars.KEYCHAIN_PROFILE }}
          archive-name:      opencl-language-server-darwin-arm64

      - name: Sign and notarize (universal)
        id: sign-universal
        uses: ./.github/actions/sign-and-notarize
        with:
          binary-path:       .build-universal/opencl-language-server
          entitlements-path: build-support/opencl-language-server.entitlements
          signing-identity:  ${{ secrets.SIGNING_IDENTITY }}
          keychain-profile:  ${{ vars.KEYCHAIN_PROFILE }}
          archive-name:      opencl-language-server-darwin-universal

      # We need to compress the executables again because the releases use the .tar.gz format, and notarization requires .zip.

      - name: Archive Artifact
        run: | 
          cd ${{github.workspace}}/.build-x86_64/
          tar -czvf opencl-language-server-darwin-x86_64.tar.gz opencl-language-server
          
          cd ${{github.workspace}}/.build-armv8/
          tar -czvf opencl-language-server-darwin-arm64.tar.gz opencl-language-server
          
          cd ${{github.workspace}}/.build-universal/
          tar -czvf opencl-language-server-darwin-universal.tar.gz opencl-language-server

      - name: Upload artifact (x86_64)
        uses: actions/upload-artifact@v7
        with:
          name: opencl-language-server-darwin-x86_64.tar.gz
          path: ${{github.workspace}}/.build-x86_64/opencl-language-server-darwin-x86_64.tar.gz
          retention-days: 1
          archive: false

      - name: Upload artifact (arm64)
        uses: actions/upload-artifact@v7
        with:
          name: opencl-language-server-darwin-arm64.tar.gz
          path: ${{github.workspace}}/.build-armv8/opencl-language-server-darwin-arm64.tar.gz
          retention-days: 1
          archive: false

      - name: Upload artifact (universal)
        uses: actions/upload-artifact@v7
        with:
          name: opencl-language-server-darwin-universal.tar.gz
          path: ${{github.workspace}}/.build-universal/opencl-language-server-darwin-universal.tar.gz
          retention-days: 1
          archive: false

      - name: Cleanup Apple signing
        if: always()
        uses: ./.github/actions/cleanup-apple-signing
        with:
          keychain-path: ${{ steps.setup-signing.outputs.keychain-path }}
